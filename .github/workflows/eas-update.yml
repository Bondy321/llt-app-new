name: EAS Update

on:
  push:
    branches:
      - main

jobs:
  publish-development-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish development channel update (native only)
        run: |
          eas update --channel preview --platform ios --message "CI update: ${{ github.sha }}"
          eas update --channel development --platform android --message "CI update: ${{ github.sha }}"
