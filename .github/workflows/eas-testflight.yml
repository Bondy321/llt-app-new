name: EAS TestFlight

on:
  workflow_dispatch:
    inputs:
      eas_build_id:
        description: Existing completed EAS iOS build ID to submit without creating a new build
        required: false
        type: string
      testflight_groups:
        description: Comma-separated internal TestFlight groups
        required: false
        type: string
      clear_cache:
        description: Clear the EAS build cache before building
        required: false
        default: false
        type: boolean

concurrency:
  group: eas-testflight-production
  cancel-in-progress: false

jobs:
  build-ios:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    outputs:
      build_id: ${{ steps.select-build.outputs.build_id }}
    env:
      CI: true
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_DATABASE_URL: ${{ secrets.EXPO_PUBLIC_FIREBASE_DATABASE_URL }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MEASUREMENT_ID }}
      EXPO_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_API_KEY }}
      EXPO_PUBLIC_SUPPORT_PHONE: '+441414876737'
      EXPO_PUBLIC_VERIFY_PASSENGER_LOGIN_URL: ${{ secrets.EXPO_PUBLIC_VERIFY_PASSENGER_LOGIN_URL }}
      EXPO_PUBLIC_VERIFY_PASSENGER_LOGIN_TIMEOUT_MS: ${{ secrets.EXPO_PUBLIC_VERIFY_PASSENGER_LOGIN_TIMEOUT_MS }}
      EXPO_PUBLIC_VERIFY_PASSENGER_LOGIN_USE_APPCHECK: ${{ secrets.EXPO_PUBLIC_VERIFY_PASSENGER_LOGIN_USE_APPCHECK || 'false' }}
      EXPO_PUBLIC_VERIFY_PASSENGER_LOGIN_REQUIRE_APPCHECK: ${{ secrets.EXPO_PUBLIC_VERIFY_PASSENGER_LOGIN_REQUIRE_APPCHECK || 'false' }}
      LLT_VALIDATE_PLATFORM: ios
      EAS_BUILD_CLEAR_CACHE: ${{ inputs.clear_cache }}
      EAS_BUILD_ID: ${{ inputs.eas_build_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release commit is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor ${{ github.sha }} origin/main

      - name: Setup Node.js 24
        if: ${{ !inputs.eas_build_id }}
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Setup Java for Firebase emulators
        if: ${{ !inputs.eas_build_id }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        if: ${{ !inputs.eas_build_id }}
        run: npm ci

      - name: Install Functions dependencies
        if: ${{ !inputs.eas_build_id }}
        run: npm --prefix functions ci

      - name: Run mobile smoke tests
        if: ${{ !inputs.eas_build_id }}
        run: npm run test:mobile:ota

      - name: Run Functions script tests
        if: ${{ !inputs.eas_build_id }}
        run: npm run test:functions:scripts

      - name: Run Firebase rules tests
        if: ${{ !inputs.eas_build_id }}
        run: npm run test:emulators

      - name: Validate Expo public environment
        if: ${{ !inputs.eas_build_id }}
        run: npm run validate:expo-env -- --platform=ios

      - name: Validate EAS build inputs
        if: ${{ !inputs.eas_build_id }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${EXPO_TOKEN:-}" ]]; then
            echo "::error::Missing EXPO_TOKEN repository secret."
            exit 1
          fi

      - name: Setup Expo and EAS CLI
        if: ${{ !inputs.eas_build_id }}
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      - name: Sync EAS production environment
        if: ${{ !inputs.eas_build_id }}
        run: npm run sync:eas-env:production -- --platform=ios

      - name: Log release context
        if: ${{ !inputs.eas_build_id }}
        run: |
          echo "GitHub ref: ${{ github.ref }}"
          echo "GitHub sha: ${{ github.sha }}"
          node -e "const app=require('./app.config.js').expo; console.log('Expo app version:', app.version)"
          eas whoami
          eas project:info --non-interactive

      - name: Verify EAS iOS version state
        if: ${{ !inputs.eas_build_id }}
        run: eas build:version:get --platform ios --profile production --non-interactive

      - name: Build production iOS binary
        id: eas-build
        if: ${{ !inputs.eas_build_id }}
        shell: bash
        run: |
          set -euo pipefail

          build_args=(
            --profile production
            --platform ios
            --non-interactive
            --wait
            --json
            --message "TestFlight CI build $GITHUB_SHA"
          )

          if [[ "${EAS_BUILD_CLEAR_CACHE:-false}" == "true" ]]; then
            build_args+=(--clear-cache)
          fi

          eas build "${build_args[@]}" > eas-build.json

          node <<'NODE'
          const fs = require('fs');

          const parsed = JSON.parse(fs.readFileSync('eas-build.json', 'utf8'));
          const builds = Array.isArray(parsed) ? parsed : [parsed];
          const build = builds.find((item) => String(item.platform).toLowerCase() === 'ios') || builds[0];

          if (!build || !build.id) {
            throw new Error('EAS build output did not include an iOS build id.');
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `build_id=${build.id}\n`);
          console.log(`EAS iOS build id: ${build.id}`);

          if (build.buildDetailsPageUrl) {
            console.log(`Build details: ${build.buildDetailsPageUrl}`);
          }
          NODE

      - name: Select EAS build for submission
        id: select-build
        shell: bash
        env:
          BUILT_EAS_BUILD_ID: ${{ steps.eas-build.outputs.build_id }}
        run: |
          set -euo pipefail

          manual_build_id="${EAS_BUILD_ID:-}"
          manual_build_id="${manual_build_id#"${manual_build_id%%[![:space:]]*}"}"
          manual_build_id="${manual_build_id%"${manual_build_id##*[![:space:]]}"}"

          if [[ -n "$manual_build_id" ]]; then
            echo "build_id=$manual_build_id" >> "$GITHUB_OUTPUT"
            echo "Using existing EAS iOS build id: $manual_build_id"
            exit 0
          fi

          if [[ -z "${BUILT_EAS_BUILD_ID:-}" ]]; then
            echo "::error::No EAS build id was supplied or created."
            exit 1
          fi

          echo "build_id=$BUILT_EAS_BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "Using newly-created EAS iOS build id: $BUILT_EAS_BUILD_ID"

  submit-testflight:
    needs: build-ios
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      CI: true
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_ASC_APP_ID: ${{ secrets.EXPO_ASC_APP_ID }}
      EXPO_ASC_API_KEY_ID: ${{ secrets.EXPO_ASC_API_KEY_ID }}
      EXPO_ASC_API_KEY_ISSUER_ID: ${{ secrets.EXPO_ASC_API_KEY_ISSUER_ID }}
      EXPO_ASC_API_KEY_P8: ${{ secrets.EXPO_ASC_API_KEY_P8 }}
      EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
      EXPO_APPLE_TEAM_ID: ${{ secrets.EXPO_APPLE_TEAM_ID }}
      EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
      EXPO_TESTFLIGHT_GROUPS: ${{ inputs.testflight_groups || vars.EXPO_TESTFLIGHT_GROUPS }}
      EAS_BUILD_ID: ${{ needs.build-ios.outputs.build_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate iOS submit configuration inputs
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${EXPO_TOKEN:-}" ]]; then
            echo "::error::Missing EXPO_TOKEN repository secret."
            exit 1
          fi

          if [[ -z "${EAS_BUILD_ID:-}" ]]; then
            echo "::error::Missing EAS build id from the build-ios job."
            exit 1
          fi

          if [[ -z "${EXPO_ASC_APP_ID:-}" ]]; then
            echo "::error::Missing EXPO_ASC_APP_ID repository secret. Add the App Store Connect app Apple ID for com.lochlomondtravel.tourapp."
            exit 1
          fi

          api_key_values=0
          [[ -n "${EXPO_ASC_API_KEY_ID:-}" ]] && api_key_values=$((api_key_values + 1))
          [[ -n "${EXPO_ASC_API_KEY_ISSUER_ID:-}" ]] && api_key_values=$((api_key_values + 1))
          [[ -n "${EXPO_ASC_API_KEY_P8:-}" ]] && api_key_values=$((api_key_values + 1))

          if [[ "$api_key_values" -ne 0 && "$api_key_values" -ne 3 ]]; then
            echo "::error::Provide all three App Store Connect API key secrets: EXPO_ASC_API_KEY_ID, EXPO_ASC_API_KEY_ISSUER_ID, and EXPO_ASC_API_KEY_P8."
            exit 1
          fi

          if [[ "$api_key_values" -eq 3 ]]; then
            echo "::notice::App Store Connect API key secrets are present and will be materialized before submitting."
          else
            echo "::notice::No App Store Connect API key secrets were provided; EAS Submit will use App Store Connect credentials configured in EAS, if available."
          fi

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ env.EXPO_TOKEN }}

      - name: Log submit context
        run: |
          echo "GitHub ref: ${{ github.ref }}"
          echo "GitHub sha: ${{ github.sha }}"
          echo "EAS build id: $EAS_BUILD_ID"
          eas whoami
          eas project:info --non-interactive

      - name: Configure iOS submit profile
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${EXPO_ASC_API_KEY_ID:-}" && -n "${EXPO_ASC_API_KEY_ISSUER_ID:-}" && -n "${EXPO_ASC_API_KEY_P8:-}" ]]; then
            mkdir -p .asc-api-key
            printf '%s' "$EXPO_ASC_API_KEY_P8" > .asc-api-key/AuthKey.p8
            chmod 600 .asc-api-key/AuthKey.p8
          fi

          node <<'NODE'
          const fs = require('fs');

          const eas = JSON.parse(fs.readFileSync('eas.json', 'utf8'));
          const submit = eas.submit || {};
          const production = submit.production || {};
          const ios = {
            ...(production.ios || {}),
            bundleIdentifier: 'com.lochlomondtravel.tourapp',
            ascAppId: process.env.EXPO_ASC_APP_ID,
          };

          if (process.env.EXPO_APPLE_ID) {
            ios.appleId = process.env.EXPO_APPLE_ID;
          }

          if (process.env.EXPO_APPLE_TEAM_ID) {
            ios.appleTeamId = process.env.EXPO_APPLE_TEAM_ID;
          }

          if (
            process.env.EXPO_ASC_API_KEY_ID &&
            process.env.EXPO_ASC_API_KEY_ISSUER_ID &&
            process.env.EXPO_ASC_API_KEY_P8
          ) {
            ios.ascApiKeyId = process.env.EXPO_ASC_API_KEY_ID;
            ios.ascApiKeyIssuerId = process.env.EXPO_ASC_API_KEY_ISSUER_ID;
            ios.ascApiKeyPath = './.asc-api-key/AuthKey.p8';
          }

          eas.submit = {
            ...submit,
            production: {
              ...production,
              ios,
            },
          };

          fs.writeFileSync('eas.json', `${JSON.stringify(eas, null, 2)}\n`);
          console.log('Prepared iOS submit profile for TestFlight.');
          NODE

      - name: Submit build to TestFlight
        shell: bash
        run: |
          set -euo pipefail

          submit_args=(
            --platform ios
            --profile production
            --id "$EAS_BUILD_ID"
            --non-interactive
            --wait
          )

          if [[ -n "${EXPO_TESTFLIGHT_GROUPS:-}" ]]; then
            IFS=',' read -ra groups <<< "$EXPO_TESTFLIGHT_GROUPS"
            for group in "${groups[@]}"; do
              trimmed="${group#"${group%%[![:space:]]*}"}"
              trimmed="${trimmed%"${trimmed##*[![:space:]]}"}"
              if [[ -n "$trimmed" ]]; then
                submit_args+=(--groups "$trimmed")
              fi
            done
          fi

          eas submit "${submit_args[@]}"
